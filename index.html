<!DOCTYPE html>
<html>
<head>
    <title>موقعي الأول</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        h1 { font-size: 2.5em; }
        button {
            padding: 15px 30px;
            font-size: 1.2em;
            background: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🚀 مرحباً من الموبايل!</h1>
    <p>تم نشر هذا الموقع بالكامل من هاتفي المحمول</p>
    <button onclick="alert('يعمل! 🎉')">اضغط هنا</button>
    <p id="time"></p>
    <script>
        document.getElementById('time').innerHTML = 'الوقت الآن: ' + new Date().toLocaleString();
    </script>
</body>
</html>
